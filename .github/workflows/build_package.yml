name: Build package
on:
  workflow_dispatch:
    inputs:
      pkgname:
        description: "Package to build"
        required: true
      nodeps:
        description: "Skip dependency checks (use 1 to disable dependency checks)"
        required: false
permissions:
  id-token: write
  contents: read
  attestations: write
  artifact-metadata: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        path: buildsrc
    - name: Prepare build environment
      run: |
        sudo chown -R 1000 buildsrc
        sudo chown -R $(id -u) buildsrc/.git
        sudo install -d -o 1000 -g users repo
    - name: Use geschenkerbauer to build packages
      uses: mutantmonkey/geschenkerbauer/action@8a59d3ba77a471258eabb184f846612597518d13 # main
      env:
        PACKAGER: geschenkerbauer on github <archpkgs+github@mutantmonkey.mx>
      with:
        packages: ${{ github.event.inputs.pkgname }}
        nodeps: ${{ github.event.inputs.nodeps }}
    - name: Replace forbidden colon character in package filenames
      run: |
        for f in $(find . -iname '*:*'); do
          sudo mv "$f" "${f/:/__3A__}"
        done || exit 0
      working-directory: ./repo
    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: output
        path: repo
    - name: Generate artifact attestation
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      with:
        subject-path: 'repo/*'
