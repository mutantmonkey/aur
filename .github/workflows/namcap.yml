name: Check PKGBUILDs using namcap
on:
  push:
    paths-ignore:
      - '.github/workflows/**'
      - 'keyring.asc'
  workflow_dispatch:
permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Check all PKGBUILDs using namcap
      uses: mutantmonkey/geschenkerbauer/actions/namcap@c00c7f432884cbd0aee710135261383886064588 # main
